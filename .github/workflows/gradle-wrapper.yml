name: Gradle build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Build and test
        run: ./gradlew build --no-daemon
